<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filters Bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,600;6..72,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wf-primary:        #7C5CFC;
      --wf-primary-hover:  #6A4AE8;
      --wf-primary-dark:   #5A3DD6;
      --wf-primary-muted:  #A994FF;
      --wf-primary-faint:  rgba(124,92,252,0.08);
      --wf-ink:            #1A0E40;
      --wf-ink-2:          #6B6085;
      --wf-ink-3:          #9890AD;
      --wf-bg:             #F6F4FB;
      --wf-surface:        #FFFFFF;
      --wf-surface-soft:   #FAF9FF;
      --wf-border:         #E4DFF2;
      --wf-border-strong:  #C8BFE0;
      --wf-disabled:       #D4CFE6;
      --font-body:    'Kumbh Sans', system-ui, sans-serif;
      --font-display: 'Newsreader', Georgia, serif;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-pill: 999px;
      --sp-1: 0.25rem; --sp-2: 0.5rem; --sp-3: 0.75rem; --sp-4: 1rem; --sp-5: 1.25rem; --sp-6: 1.5rem; --sp-8: 2rem;
      --shadow-xs: 0 1px 2px rgba(26,14,64,0.06);
      --shadow-sm: 0 2px 8px rgba(26,14,64,0.08);
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --duration-fast: 150ms;
      --duration-normal: 250ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--wf-bg);
      color: var(--wf-ink);
      padding: var(--sp-8);
      line-height: 1.5;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--wf-ink);
      margin-bottom: var(--sp-2);
    }

    .page-subtitle {
      color: var(--wf-ink-2);
      font-size: 0.88rem;
      margin-bottom: var(--sp-8);
    }

    .state-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--wf-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--sp-3);
      margin-top: var(--sp-6);
    }

    /* Filters bar */
    .filters-bar {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) 0;
      max-width: 800px;
      flex-wrap: wrap;
    }

    /* Search input */
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--wf-ink-3);
      pointer-events: none;
    }

    .search-icon svg {
      width: 16px;
      height: 16px;
    }

    .search-input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border: 1.5px solid var(--wf-border);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--wf-ink);
      background: var(--wf-surface);
      outline: none;
      transition: border-color var(--duration-fast) ease, box-shadow var(--duration-fast) ease;
    }

    .search-input:focus {
      border-color: var(--wf-primary);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.10);
    }

    .search-input::placeholder {
      color: var(--wf-ink-3);
    }

    /* Divider */
    .filter-divider {
      width: 1px;
      height: 24px;
      background: var(--wf-border);
      flex-shrink: 0;
    }

    /* Filter chips */
    .filter-chips {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 600;
      border: 1.5px solid var(--wf-border);
      background: var(--wf-surface);
      color: var(--wf-ink-2);
      cursor: pointer;
      transition: all var(--duration-fast) ease;
      white-space: nowrap;
    }

    .filter-chip:hover {
      border-color: var(--wf-border-strong);
      background: var(--wf-surface-soft);
      color: var(--wf-ink);
    }

    .filter-chip.active {
      border-color: var(--wf-primary);
      background: var(--wf-primary-faint);
      color: var(--wf-primary);
    }

    .filter-chip-count {
      font-size: 0.68rem;
      font-weight: 700;
      background: var(--wf-border);
      color: var(--wf-ink-2);
      border-radius: var(--radius-pill);
      padding: 1px 7px;
      line-height: 1.4;
    }

    .filter-chip.active .filter-chip-count {
      background: rgba(124,92,252,0.15);
      color: var(--wf-primary);
    }

    /* Sort dropdown */
    .sort-wrap {
      position: relative;
      margin-left: auto;
    }

    .sort-select {
      appearance: none;
      padding: 8px 36px 8px 14px;
      border: 1.5px solid var(--wf-border);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--wf-ink-2);
      background: var(--wf-surface);
      cursor: pointer;
      outline: none;
      transition: border-color var(--duration-fast) ease;
    }

    .sort-select:hover,
    .sort-select:focus {
      border-color: var(--wf-border-strong);
    }

    .sort-chevron {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--wf-ink-3);
      pointer-events: none;
    }

    .sort-chevron svg {
      width: 14px;
      height: 14px;
    }
  </style>
</head>
<body>

  <h1 class="page-title">Filters Bar</h1>
  <p class="page-subtitle">Search, filter chips, and sort controls</p>

  <!-- Default state -->
  <div class="state-label">Default — No filters active</div>
  <div class="filters-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
      </div>
      <input class="search-input" type="text" placeholder="Search candidates..." />
    </div>

    <div class="filter-divider"></div>

    <div class="filter-chips">
      <button class="filter-chip">All <span class="filter-chip-count">9</span></button>
      <button class="filter-chip">Engineering <span class="filter-chip-count">4</span></button>
      <button class="filter-chip">Design <span class="filter-chip-count">3</span></button>
      <button class="filter-chip">Product <span class="filter-chip-count">2</span></button>
    </div>

    <div class="sort-wrap">
      <select class="sort-select">
        <option>Newest first</option>
        <option>Oldest first</option>
        <option>Name A-Z</option>
        <option>Name Z-A</option>
      </select>
      <div class="sort-chevron">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
      </div>
    </div>
  </div>

  <!-- Active filter state -->
  <div class="state-label">Active filter — "Engineering" selected</div>
  <div class="filters-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
      </div>
      <input class="search-input" type="text" placeholder="Search candidates..." />
    </div>

    <div class="filter-divider"></div>

    <div class="filter-chips">
      <button class="filter-chip">All <span class="filter-chip-count">9</span></button>
      <button class="filter-chip active">Engineering <span class="filter-chip-count">4</span></button>
      <button class="filter-chip">Design <span class="filter-chip-count">3</span></button>
      <button class="filter-chip">Product <span class="filter-chip-count">2</span></button>
    </div>

    <div class="sort-wrap">
      <select class="sort-select">
        <option>Newest first</option>
        <option>Oldest first</option>
        <option>Name A-Z</option>
        <option>Name Z-A</option>
      </select>
      <div class="sort-chevron">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
      </div>
    </div>
  </div>

  <!-- With search text -->
  <div class="state-label">Active search — "Santos"</div>
  <div class="filters-bar">
    <div class="search-wrap">
      <div class="search-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>
      </div>
      <input class="search-input" type="text" value="Santos" style="border-color:var(--wf-primary); box-shadow: 0 0 0 3px rgba(124,92,252,0.10)" />
    </div>

    <div class="filter-divider"></div>

    <div class="filter-chips">
      <button class="filter-chip active">All <span class="filter-chip-count">1</span></button>
      <button class="filter-chip">Engineering <span class="filter-chip-count">1</span></button>
      <button class="filter-chip">Design <span class="filter-chip-count">0</span></button>
      <button class="filter-chip">Product <span class="filter-chip-count">0</span></button>
    </div>

    <div class="sort-wrap">
      <select class="sort-select">
        <option>Newest first</option>
        <option>Oldest first</option>
        <option>Name A-Z</option>
        <option>Name Z-A</option>
      </select>
      <div class="sort-chevron">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
      </div>
    </div>
  </div>

</body>
</html>
